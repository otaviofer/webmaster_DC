<!doctype html>

<!--
	================
	TABELA, DIVISÕES, FORMULÁRIO E MAIS ATRIBUTOS
	================
-->

<html>
	<head>
		<meta charset="utf-8">
		<title>Aula 06 - Mais tag's</title>
	</head>

	<body>

		<!-- Divs (A tag <div> é um contêiner genérico em bloco, usada para agrupar e organizar outros elementos HTML para fins de estilização (com CSS) ou manipulação (com JavaScript).) -->

		<div>
			<h2>Título do meu conteúdo!</h2>
			<p>Conteúdo</p>
		</div>

		<div>
			<h2>Título do meu conteúdo!</h2>
			<p>Conteúdo</p>
		</div>

		<br>
		<br>
		
		<!-- Tabelas (A tag <table> organiza dados em linhas e colunas, sendo estruturada com <tr> (linhas), <th> (cabeçalhos) e <td> (células de dados) para exibir informações tabulares.) -->

		<table width="900" align="center" border="1">
			<thead> <!-- cabeça -->
				<tr>
					<th>Nome</th>
					<th>Idade</th>
					<th>Cargo</th>
				</tr>
			</thead>
			<tbody> <!-- corpo -->
				<tr>
					<td>Otávio</td>
					<td>27</td>
					<td>Programador</td>
				</tr>
				<tr>
					<td>Rafaela</td>
					<td>23</td>
					<td>Gestora</td>
				</tr>
			</tbody>
		</table>

		<br>
		<br>

		<!-- Formulários (A tag <form> cria um formulário interativo para coletar dados do usuário, contendo campos de entrada como <input>, <textarea> e <select>, que podem ser enviados para processamento.) -->

		<form>
			<input type="text" />
			<input type="password" />
			<textarea></textarea>
			<input type="button" value="Enviar" />
			<input type="submit" value="Enviar" />
		</form>

	</body>
</html>
